<head>

<body>

    <mobile-dashboard active="sisa"></mobile-dashboard>

        <div class="alert-row">
            <div>
                <div style="font-weight: 600; font-size: 14px; color: #9f1239;">Lakban Bening 2 Inch</div>

            <div class="badge-danger">Sisa 3 Pcs</div>
        </div>

        <div class="alert-row">
            <div>
                <div style="font-weight: 600; font-size: 14px; color: #9f1239;">Kabel Tembaga 5m</div>
