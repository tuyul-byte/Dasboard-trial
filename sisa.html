<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Kritis</title>
    <script src="dashboard.js" defer></script>
    <style>
        .alert-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff1f2; border-left: 4px solid #f43f5e; border-radius: 6px; margin-bottom: 10px; }
        .badge-danger { background: #f43f5e; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .btn-laporkan { background: #e11d48; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Memanggil komponen navigasi mobile dengan mengaktifkan menu sisa -->
    <mobile-dashboard active="sisa"></mobile-dashboard>

    <div class="container">
        <h3 style="font-size: 15px; margin: 0 0 12px 0; color: #64748b;">⚠️ Peringatan Stok Kritis (&lt; 10 Pcs)</h3>
        
        <!-- List Barang Menipis -->
        <div class="alert-row">
            <div>
                <div style="font-weight: 600; font-size: 14px; color: #9f1239;">Lakban Bening 2 Inch</div>
                <div style="font-size: 11px; color: #fda4af;">SKU: LK-02 • Sisa 3 Pcs</div>
            </div>
            <button class="btn-laporkan" onclick="laporkanKritis('Lakban Bening 2 Inch', 3)">Laporkan</button>
        </div>

        <div class="alert-row">
            <div>
                <div style="font-weight: 600; font-size: 14px; color: #9f1239;">Kabel Tembaga 5m</div>
                <div style="font-size: 11px; color: #fda4af;">SKU: KB-55 • Sisa 5 Pcs</div>
            </div>
            <button class="btn-laporkan" onclick="laporkanKritis('Kabel Tembaga 5m', 5)">Laporkan</button>
        </div>
    </div>

    <script>
        function laporkanKritis(namaBarang, sisa) {
            if (typeof window.catatAktivitas === "function") {
                window.catatAktivitas("KRITIS", `⚠️ Peringatan: Stok ${namaBarang} kritis, segera restock! (Sisa ${sisa} Pcs).`);
                alert(`Laporan bahaya untuk ${namaBarang} dikirim ke Ringkasan Utama.`);
            }
        }
    </script>
</body>
</html>
