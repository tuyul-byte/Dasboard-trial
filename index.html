<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ringkasan Gudang</title>
    <script src="dashboard.js" defer></script>
    <style>
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { padding: 15px; border-radius: 10px; text-align: center; color: white; }
        .bg-blue { background: #0284c7; }
        .bg-amber { background: #d97706; }
        .log-item { padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    </style>
</head>
<body>

    <mobile-dashboard active="dashboard"></mobile-dashboard>

    <div class="container">
        <div class="grid-2">
            <div class="stat-box bg-blue">
                <h3 id="total-item-box">1450</h3>
                <p>Total Item</p>
            </div>
            <div class="stat-box bg-amber">
                <h3 id="total-kritis-box">0</h3>
                <p>Stok Kritis</p>
            </div>
        </div>

        <div class="app-card">
            <h4 style="margin: 0 0 10px 0; color: #1e293b;">🔄 Riwayat Aktivitas Gudang</h4>
            <div id="wadah-riwayat">
                <div style="text-align: center; color: #94a3b8; padding: 15px;">Memuat riwayat logistik...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const riwayat = JSON.parse(localStorage.getItem('log_gudang')) || [];
            const wadah = document.getElementById('wadah-riwayat');
            
            if (riwayat.length === 0) {
                wadah.innerHTML = '<div style="color:#94a3b8; text-align:center;">Belum ada aktivitas hari ini.</div>';
                return;
            }

            let htmlKonten = "";
            riwayat.forEach(item => {
                htmlKonten += `<div class="log-item"><b>${item.waktu}</b> - ${item.pesan}</div>`;
            });
            wadah.innerHTML = htmlKonten;
            document.getElementById('total-kritis-box').innerText = riwayat.filter(x => x.tipe === "KRITIS").length;
        });
    </script>
</body>
</html>
